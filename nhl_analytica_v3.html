    <head>

        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
        <style>
            :root { --neon: #38bdf8; --bg: #020617; --card: #0f172a; }
            body { background: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
            
            /* Header & Dashboard */
            header { padding: 40px 5%; background: linear-gradient(to bottom, #1e293b, var(--bg)); border-bottom: 2px solid var(--neon); }
            .brand h1 { font-family: 'Orbitron'; font-size: 3rem; margin: 0; text-shadow: 0 0 20px var(--neon); color: var(--neon); }
            
            /* Team Filter Bar */
            .team-bar { padding: 20px 5%; display: flex; gap: 15px; overflow-x: auto; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); sticky; top: 0; z-index: 10; }
            .filter-logo { width: 45px; height: 45px; cursor: pointer; transition: 0.3s; filter: grayscale(1); }
            .filter-logo:hover, .filter-logo.active { filter: grayscale(0); transform: scale(1.2); drop-shadow: 0 0 10px var(--neon); }

            /* Control Panel */
            .controls { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
            .search-input { background: #1e293b; border: 1px solid var(--neon); border-radius: 30px; padding: 12px 25px; color: #fff; width: 300px; outline: none; }
            .sort-btns button { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-left: 5px; transition: 0.3s; }
            .sort-btns button.active { border-color: var(--neon); color: var(--neon); background: rgba(56,189,248,0.1); }

            /* Player Grid */
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px 5%; }
            .p-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #1e293b; transition: 0.4s; cursor: pointer; position: relative; }
            .p-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 10px 30px rgba(56,189,248,0.2); }
            .p-card-top { height: 100px; display: flex; align-items: flex-end; padding: 0 20px; }
            .p-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon); background: #000; margin-bottom: -30px; z-index: 2; }
            .p-body { padding: 40px 20px 20px; }
            .p-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; font-family: 'Orbitron'; }
            .p-stats-mini { display: flex; justify-content: space-between; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }
            
            /* Modal & Chart */
            .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); }
            .modal-content { background: #0f172a; width: 90%; max-width: 800px; margin: 5vh auto; border-radius: 30px; border: 1px solid var(--neon); display: flex; overflow: hidden; }
            .modal-left { flex: 1; padding: 40px; text-align: center; border-right: 1px solid #1e293b; }
            .modal-right { flex: 1.2; padding: 40px; background: #020617; }
            canvas { max-width: 100%; }
        </style>
    </head>

            let currentSort = 'pts';
            let currentTeam = 'ALL';
            let radarChart = null;

            function renderGrid() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const grid = document.getElementById('mainGrid');
                grid.innerHTML = '';

                let filtered = players
                    .filter(p => (currentTeam === 'ALL' || p.abbr === currentTeam))
                    .filter(p => p.name.toLowerCase().includes(search))
                    .sort((a, b) => b[currentSort] - a[currentSort]);

                filtered.forEach(p => {
                    grid.innerHTML += `
                        <div class="p-card" onclick="openDetail('${p.id}')">
                            <div class="p-card-top" style="background:linear-gradient(to right, ${p.color}, #000)">
                                <img src="${p.photo}" class="p-img" onerror="this.src='https://assets.nhle.com/logos/nhl/svg/${p.abbr}_light.svg'">
                            </div>
                            <div class="p-body">
                                <div style="font-size:0.8rem; color:${p.color}; font-weight:700;">${p.abbr} | ${p.pos}</div>
                                <div class="p-name">${p.name}</div>
                                <div class="p-stats-mini">
                                    <div><small>GP</small><br><b>${p.gp}</b></div>
                                    <div><small>G</small><br><b>${p.g}</b></div>
                                    <div><small>A</small><br><b>${p.a}</b></div>
                                    <div style="color:var(--neon)"><small>PTS</small><br><b>${p.pts}</b></div>
                                </div>
                            </div>
                        </div>`;
                });
            }

            function filterByTeam(team) {
                currentTeam = team;
                document.querySelectorAll('.filter-logo').forEach(el => el.classList.remove('active'));
                event.target.classList.add('active');
                renderGrid();
            }

            function changeSort(key) {
                currentSort = key;
                document.querySelectorAll('.sort-btns button').forEach(el => el.classList.remove('active'));
                event.target.classList.add('active');
                renderGrid();
            }

            function openDetail(id) {
                const p = players.find(x => x.id === id);
                document.getElementById('modalLeft').innerHTML = `
                    <img src="${p.photo}" style="width:180px; border-radius:50%; border:5px solid var(--neon);">
                    <h2 style="font-family:'Orbitron'; font-size:2rem; margin:20px 0 10px;">${p.name}</h2>
                    <p style="color:var(--neon); font-weight:700;">${p.abbr} | ${p.pos}</p>
                    <hr style="border:0; border-top:1px solid #1e293b; margin:20px 0;">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;">
                        <div>골: ${p.g}</div><div>어시스트: ${p.a}</div>
                        <div>경기수: ${p.gp}</div><div>득실차: ${p.plusMinus}</div>
                    </div>
                `;
                
                document.getElementById('pModal').style.display = 'block';
                drawChart(p);
            }

            function drawChart(p) {
                const ctx = document.getElementById('radarChart').getContext('2d');
                if(radarChart) radarChart.destroy();
                
                radarChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Goals', 'Assists', 'Points', 'Shots', 'Efficiency'],
                        datasets: [{
                            label: p.name,
                            data: [p.g*2, p.a*1.5, p.pts, p.sh/10, (p.g/p.sh)*100 || 0],
                            fill: true,
                            backgroundColor: 'rgba(56, 189, 248, 0.2)',
                            borderColor: '#38bdf8',
                            pointBackgroundColor: '#38bdf8',
                        }]
                    },
                    options: { 
                        scales: { r: { grid: { color: '#1e293b' }, angleLines: { color: '#1e293b' }, ticks: { display: false } } },
                        plugins: { legend: { display: false } }
                    }
                });
            }

            function closeModal() { document.getElementById('pModal').style.display = 'none'; }
            
            // 초기 렌더링
            renderGrid();
        </script>
    </body>
    </html>
