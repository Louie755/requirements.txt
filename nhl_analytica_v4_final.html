        <style>
            :root { --accent: #38bdf8; --bg: #030712; --card: rgba(31, 41, 55, 0.4); }
            body { background: var(--bg); color: #e5e7eb; font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
            
            header { 
                position: sticky; top: 0; z-index: 100;
                background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(20px);
                border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px 5%;
                display: flex; justify-content: space-between; align-items: center;
            }
            .logo { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; color: var(--accent); }
            
            .team-ribbon { display: flex; gap: 12px; padding: 15px 5%; overflow-x: auto; background: rgba(255,255,255,0.03); scrollbar-width: none; }
            .t-badge { min-width: 50px; height: 50px; border-radius: 12px; background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
            .t-badge:hover { transform: scale(1.1); background: rgba(56,189,248,0.1); border: 1px solid var(--accent); }
            .t-badge img { width: 35px; }

            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 30px 5%; }
            .card { 
                background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); 
                cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; will-change: transform;
            }
            .card:hover { border-color: var(--accent); transform: translateY(-4px); }
            .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--t-color); opacity: 0.8; }
            
            .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
            .p-thumb { width: 60px; height: 60px; border-radius: 50%; background: #000; border: 2px solid var(--t-color); }
            .comp-bar { height: 6px; background: #374151; border-radius: 3px; margin-top: 8px; overflow: hidden; }
            .comp-fill { height: 100%; background: var(--accent); width: 0; transition: width 1s ease-out; }

            .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); }
            .modal-box { background: #111827; width: 90%; max-width: 850px; margin: 5vh auto; border-radius: 30px; border: 1px solid var(--accent); display: grid; grid-template-columns: 1fr 1.3fr; overflow: hidden; }
            .m-info { padding: 40px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
            .m-viz { padding: 40px; background: #030712; }
        </style>

                                <img src="https://assets.nhle.com/mugs/nhl/latest/${p.id}.png" class="p-thumb" loading="lazy" onerror="this.src='https://assets.nhle.com/logos/nhl/svg/${p.abbr}_light.svg'">
                                <div><h3 style="margin:0; font-size:1rem;">${p.name}</h3><span style="font-size:0.7rem; color:#9ca3af;">${p.abbr} • ${p.pos}</span></div>
                                <div style="margin-left:auto; text-align:right;"><b style="color:var(--accent); font-size:1.2rem;">${p.pts}</b><br><small style="font-size:0.5rem;">PTS</small></div>
                            </div>
                            <div style="font-size:0.65rem; color:#9ca3af; display:flex; justify-content:space-between;"><span>Efficiency vs Avg</span><span>${Math.round((p.pts/avgPts)*100)}%</span></div>
                            <div class="comp-bar"><div class="comp-fill" style="width: ${ratio}%"></div></div>
                        </div>`;
                    });
                grid.innerHTML = html;
            }

            function filterTeam(t) { teamFilter = (teamFilter === t) ? 'ALL' : t; render(); }
            function openModal(id) {
                const p = data.find(x => x.id === id);
                document.getElementById('mInfo').innerHTML = `<img src="https://assets.nhle.com/mugs/nhl/latest/${p.id}.png" style="width:140px; border-radius:50%; border:3px solid ${p.color}"><h2>${p.name}</h2><p style="color:var(--accent)">${p.abbr} PRO DATA</p><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; font-size:0.8rem;"><div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">GP: ${p.gp}</div><div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">G: ${p.g}</div></div>`;
                document.getElementById('modal').style.display = 'block';
                if(chart) chart.destroy();
                chart = new Chart(document.getElementById('radar'), { type: 'radar', data: { labels: ['G', 'A', 'PTS', 'PPG', 'PM'], datasets: [{ data: [p.g, p.a, p.pts/2, p.ppg*20, p.pm+20], borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.2)' }] }, options: { plugins: { legend: {display:false} }, scales: { r: { ticks:{display:false}, grid:{color:'#374151'} } } } });
            }
            function closeModal() { document.getElementById('modal').style.display = 'none'; if(chart) chart.destroy(); }
            render();
        </script>
    </body>
    </html>
