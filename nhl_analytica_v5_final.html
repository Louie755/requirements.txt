            let currentTeam = 'ALL';
            let radar = null;
            function render() {
                const search = document.getElementById('searchBar').value.toLowerCase();
                const grid = document.getElementById('mainGrid');
                grid.innerHTML = '';
                players.filter(p => (currentTeam === 'ALL' || p.abbr === currentTeam))
                       .filter(p => p.name.toLowerCase().includes(search))
                       .forEach(p => {
                    grid.innerHTML += `<div class="cyber-card" onclick="openDetail('${p.id}')">
                        <div class="card-hero" style="background: linear-gradient(45deg, ${p.color}99, transparent)">
                            <img src="${p.photo}" class="p-photo" onerror="this.src='https://assets.nhle.com/logos/nhl/svg/${p.abbr}_light.svg'">
                        </div>
                        <div class="p-meta">
                            <div style="font-family:'Orbitron'; font-size:1.2rem; font-weight:900;">${p.name}</div>
                            <div style="color:#64748b; font-size:0.8rem;">${p.abbr} // ${p.pos}</div>
                            <div class="stat-row">
                                <div><small>GP</small><br><b>${p.gp}</b></div>
                                <div><small>G</small><br><b>${p.g}</b></div>
                                <div><small>A</small><br><b>${p.a}</b></div>
                                <div style="color:var(--neon)"><small>PTS</small><br><b>${p.pts}</b></div>
                            </div>
                        </div>
                    </div>`;
                });
            }
            function filterByTeam(t) { currentTeam = (currentTeam === t) ? 'ALL' : t; render(); }
            function openDetail(id) {
                const p = players.find(x => x.id === id);
                document.getElementById('mLeft').innerHTML = `<img src="${p.photo}" style="width:150px; border-radius:50%; border:3px solid var(--neon);"><h2 style="font-family:'Orbitron';">${p.name}</h2><p>${p.abbr} | PACE: ${p.pace}</p>`;
                document.getElementById('modal').style.display = 'block';
                const ctx = document.getElementById('radarChart').getContext('2d');
                if(radar) radar.destroy();
                radar = new Chart(ctx, { type: 'radar', data: { labels: ['G', 'A', 'PTS', 'PPG', 'PM'], datasets: [{ data: [p.g, p.a, p.pts, p.ppg*10, p.pm+20], borderColor: '#00f2ff', backgroundColor: 'rgba(0,242,255,0.2)' }] }, options: { plugins: { legend: { display: false } } } });
            }
            function closeModal() { document.getElementById('modal').style.display = 'none'; }
            render();
        </script>
