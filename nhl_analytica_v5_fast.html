        <style>
            :root { --neon: #00f2ff; --bg: #020408; --card: #0d1117; }
            body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
            
            /* Performance Optimization: 가속 속성 적용 */
            header { 
                position: sticky; top: 0; z-index: 1000; padding: 20px 5%;
                background: rgba(2, 4, 8, 0.85); backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(0, 242, 255, 0.15);
                display: flex; justify-content: space-between; align-items: center;
            }
            .logo { font-family: 'Orbitron'; color: var(--neon); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0,242,255,0.3); }

            .team-dock { display: flex; gap: 8px; padding: 12px 5%; overflow-x: auto; scrollbar-width: none; background: #05070a; }
            .t-btn { min-width: 48px; height: 48px; background: #161b22; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; will-change: transform; }
            .t-btn:hover { border: 1px solid var(--neon); transform: scale(1.05); }
            .t-btn img { width: 32px; }

            /* Grid Layout: 레이아웃 고정으로 렉 감소 */
            .grid { 
                display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
                gap: 20px; padding: 25px 5%; contain: content;
            }
            .card { 
                background: var(--card); border-radius: 16px; border: 1px solid #21262d; 
                padding: 20px; cursor: pointer; transition: transform 0.2s; will-change: transform;
                position: relative; overflow: hidden;
            }
            .card:hover { transform: translateY(-4px); border-color: var(--neon); }
            
            .p-img { width: 80px; height: 80px; border-radius: 50%; background: #000; margin-bottom: 10px; }
            .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-top: 15px; text-align: center; border-top: 1px solid #21262d; padding-top: 10px; }
            .stat-grid b { color: var(--neon); font-size: 1.1rem; }
            .stat-grid small { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; }

            /* Modal */
            .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
            .m-content { background: #0d1117; width: 90%; max-width: 800px; margin: 8vh auto; border-radius: 24px; border: 1px solid var(--neon); display: flex; overflow: hidden; animation: fadeIn 0.2s; }
            @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
            .m-left { flex: 1; padding: 40px; text-align: center; border-right: 1px solid #21262d; }
            .m-right { flex: 1.2; padding: 40px; background: #010409; }
        </style>

            let chartObj = null;

            // 렌더링 최적화: innerHTML을 한 번에 업데이트
            function render() {
                const q = document.getElementById('search').value.toLowerCase();
                const grid = document.getElementById('grid');
                let html = '';

                const filtered = players.filter(p => (currentTeam === 'ALL' || p.abbr === currentTeam) && p.name.toLowerCase().includes(q));
                
                filtered.forEach(p => {
                    html += `
                    <div class="card" onclick="openModal('${p.id}')">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="https://assets.nhle.com/mugs/nhl/latest/${p.id}.png" class="p-img" loading="lazy" onerror="this.src='https://assets.nhle.com/logos/nhl/svg/${p.abbr}_light.svg'">
                            <div>
                                <div style="font-weight:900; font-size:1.1rem;">${p.name}</div>
                                <div style="color:${p.color}; font-size:0.75rem; font-weight:700;">${p.abbr} • ${p.pos}</div>
                            </div>
                        </div>
                        <div class="stat-grid">
                            <div><small>GP</small><br><b>${p.gp}</b></div>
                            <div><small>G</small><br><b>${p.g}</b></div>
                            <div><small>A</small><br><b>${p.a}</b></div>
                            <div><small>PTS</small><br><b>${p.pts}</b></div>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html;
            }

            function filterByTeam(t) { currentTeam = (currentTeam === t) ? 'ALL' : t; render(); }

            function openModal(id) {
                const p = players.find(x => x.id === id);
                document.getElementById('mLeft').innerHTML = `
                    <img src="https://assets.nhle.com/mugs/nhl/latest/${p.id}.png" style="width:140px; border:3px solid var(--neon); border-radius:50%;">
                    <h2 style="font-family:'Orbitron'; margin:20px 0 5px;">${p.name}</h2>
                    <p style="color:#8b949e;">82-GAME PACE: <span style="color:var(--neon); font-weight:900;">${p.pace}</span></p>
                `;
                document.getElementById('modal').style.display = 'block';
                
                if(chartObj) chartObj.destroy();
                const ctx = document.getElementById('chart').getContext('2d');
                chartObj = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['G', 'A', 'PTS', 'PPG', 'SHT'],
                        datasets: [{ 
                            data: [p.g, p.a, p.pts/2, p.ppg*20, p.sh/5], 
                            borderColor: '#00f2ff', backgroundColor: 'rgba(0,242,255,0.1)', borderWidth: 2 
                        }]
                    },
                    options: { animation: { duration: 400 }, scales: { r: { grid: {color:'#21262d'}, ticks:{display:false}, pointLabels:{color:'#8b949e'} } }, plugins: { legend: {display:false} } }
                });
            }

            function closeModal() { 
                document.getElementById('modal').style.display = 'none'; 
                if(chartObj) { chartObj.destroy(); chartObj = null; }
            }

            render();
        </script>
    </body>
    </html>
